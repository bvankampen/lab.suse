defaultNamespace: kube-system

helm:
  repo: https://project-hami.github.io/HAMi-WebUI/
  chart: hami-webui
  releaseName: hami-webui
  valuesFiles:
    - values.yaml

overrideTargets:
  - clusterSelector:
      matchLabels:
        fleet-app-gpu-operator-hami-webui: "true"

dependsOn:
  - name: lab-suse-fleet-gpu-operator-hami-app-hami
  - name: lab-suse-fleet-rancher-monitoring-app
