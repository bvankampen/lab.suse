cdi:
  nriPluginEnabled: true
driver:
  repository: registry.suse.com/third-party/nvidia
  usePrecompiled: true
  version: 595
devicePlugin:
  config:
    name: time-slicing-config
    default: any
    create: true
    data:
      any: |-
        version: v1
        flags:
          migStrategy: none
        sharing:
          timeSlicing:
            resources:
            - name: nvidia.com/gpu
              replicas: 16
